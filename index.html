<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Coletor Logístico</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

#reader{
width:320px;
margin:auto;
margin-top:20px;
}

.lista{
width:90%;
margin:auto;
margin-top:20px;
}

.produto{
padding:12px;
border-bottom:1px solid #ccc;
background:white;
font-size:16px;
}

.ok{
background:#9df59d;
}

</style>

</head>

<body>

<h2>Coletor de Separação</h2>

<button onclick="iniciarScanner()">Iniciar Scanner</button>

<div id="reader"></div>

<h3 id="codigo">Aguardando leitura...</h3>

<h3>Lista de Produtos</h3>

<div class="lista" id="lista"></div>

<script>

// banco de produtos por código de barras

let bancoProdutos = {

"7891150065008":"DET YPE 500ML",
"7896914002017":"PAP HIG COTTON FD",
"7891991002345":"CERV BRAHMA LT"

}

let produtos=[]
let separados=[]

function mostrarLista(){

let html=""

for(let p of produtos){

let classe = separados.includes(p.ean) ? "produto ok":"produto"

html+=`
<div class="${classe}">
${p.ean} - ${p.nome} | Qtd: ${p.qtd}
</div>
`

}

document.getElementById("lista").innerHTML=html

}

function iniciarScanner(){

const scanner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250,
formatsToSupport:[
Html5QrcodeSupportedFormats.EAN_13,
Html5QrcodeSupportedFormats.EAN_8,
Html5QrcodeSupportedFormats.CODE_128
]
}
)

scanner.render((codigoBarras)=>{

document.getElementById("codigo").innerHTML =
"Codigo lido: "+codigoBarras

let encontrado=false

for(let p of produtos){

if(p.ean==codigoBarras){

encontrado=true

if(!separados.includes(codigoBarras)){
separados.push(codigoBarras)
navigator.vibrate(200)
}

}

}

if(!encontrado){

let nomeProduto=bancoProdutos[codigoBarras]

if(nomeProduto){

let quantidade=prompt("Quantidade do produto:")

produtos.push({
ean:codigoBarras,
nome:nomeProduto,
qtd:quantidade
})

}else{

alert("Produto não cadastrado no banco.")

}

}

mostrarLista()

})

}

</script>

</body>

</html>
