<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Coletor Logístico</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

#reader{
width:320px;
margin:auto;
margin-top:20px;
}

.produto{
padding:12px;
border-bottom:1px solid #ccc;
background:white;
}

.ok{
background:#9df59d;
}

</style>

</head>

<body>

<h2>Coletor de Separação</h2>

<button onclick="iniciarScanner()">Iniciar Scanner</button>

<div id="reader"></div>

<h3>Lista</h3>

<div id="lista"></div>

<script>

let produtos = [
{ean:"7891150065008", nome:"DETERGENTE YPE"},
{ean:"7896914002017", nome:"PAPEL HIGIENICO"},
{ean:"7891991002345", nome:"CERVEJA BRAHMA"}
]

let separados=[]

function mostrarLista(){

let html=""

for(let p of produtos){

let classe = separados.includes(p.ean) ? "produto ok":"produto"

html+=`<div class="${classe}">
${p.ean} - ${p.nome}
</div>`

}

document.getElementById("lista").innerHTML=html

}

mostrarLista()

function iniciarScanner(){

const scanner = new Html5QrcodeScanner(
"reader",
{ fps:10, qrbox:250 }
)

scanner.render((codigo)=>{

for(let p of produtos){

if(p.ean==codigo){

if(!separados.includes(codigo)){

separados.push(codigo)

navigator.vibrate(200)

}

}

}

mostrarLista()

})

}

</script>

</body>

</html>
