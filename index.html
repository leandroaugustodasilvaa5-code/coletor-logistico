<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Coletor Logístico</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
padding:0;
}

h2{
margin-top:20px;
}

#reader{
width:320px;
margin:auto;
margin-top:20px;
}

.lista{
width:90%;
margin:auto;
margin-top:20px;
}

.produto{
padding:12px;
border-bottom:1px solid #ccc;
background:white;
font-size:16px;
}

.ok{
background:#9df59d;
}

.info{
margin-top:10px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Coletor de Separação</h2>

<button onclick="iniciarScanner()" style="font-size:18px;padding:10px">
Iniciar Scanner
</button>

<div id="reader"></div>

<div class="info" id="codigo">
Aguardando leitura...
</div>

<h3>Lista de Produtos</h3>

<div class="lista" id="lista"></div>

<script>

let produtos = [
{ean:"7891150065008", nome:"DETERGENTE YPE", qtd:1},
{ean:"7896914002017", nome:"PAPEL HIGIENICO", qtd:1},
{ean:"7891991002345", nome:"CERVEJA BRAHMA", qtd:1}
]

let separados=[]

function mostrarLista(){

let html=""

for(let p of produtos){

let classe = separados.includes(p.ean) ? "produto ok":"produto"

html+=`
<div class="${classe}">
${p.ean} - ${p.nome} | Qtd: ${p.qtd}
</div>
`

}

document.getElementById("lista").innerHTML=html

}

mostrarLista()

function iniciarScanner(){

const scanner = new Html5QrcodeScanner(
"reader",
{ fps:10, qrbox:250 }
)

scanner.render((codigo)=>{

document.getElementById("codigo").innerHTML =
"Codigo lido: "+codigo

let encontrado=false

for(let p of produtos){

if(p.ean==codigo){

encontrado=true

if(!separados.includes(codigo)){

separados.push(codigo)

navigator.vibrate(200)

}

}

}

if(!encontrado){

let adicionar = confirm(
"Produto não está na lista.\nDeseja adicionar?"
)

if(adicionar){

let nome = prompt("Digite o nome do produto:")

let quantidade = prompt("Digite a quantidade:")

produtos.push({
ean:codigo,
nome:nome,
qtd:quantidade
})

}

}

mostrarLista()

})

}

</script>

</body>

</html>
